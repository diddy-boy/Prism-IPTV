<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism — live TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#05070f;
    --glass-strong:rgba(12,14,24,0.66);
    --glass-border:rgba(255,255,255,0.14);
    --text-1:#f5f6fb;
    --text-2:rgba(245,246,251,0.66);
    --text-3:rgba(245,246,251,0.42);
    --accent-a:#8b7bff;
    --accent-b:#33e0c8;
    --danger-a:#ff8fa3;
    --danger-b:#ff5c7a;
    --radius-xl:26px;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-pill:999px;
    --shadow-lift:0 24px 60px -24px rgba(0,0,0,0.65), 0 2px 10px rgba(0,0,0,0.3);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg-base);
    color:var(--text-1);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* Ambient drifting colour wash, the one bold/signature touch. Everything
     else in this UI stays deliberately quiet so this reads as intentional
     rather than decorative noise. */
  .ambient-bg{
    position:fixed; inset:-10%;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 15% 20%, rgba(139,123,255,0.5), transparent 45%),
      radial-gradient(circle at 85% 12%, rgba(51,224,200,0.38), transparent 50%),
      radial-gradient(circle at 65% 82%, rgba(255,111,168,0.24), transparent 50%),
      radial-gradient(circle at 15% 88%, rgba(80,110,255,0.3), transparent 45%),
      var(--bg-base);
    background-repeat:no-repeat;
    animation:driftBg 60s ease-in-out infinite alternate;
  }
  @keyframes driftBg{
    0%{
      background-position:0% 0%, 100% 0%, 60% 100%, 0% 100%, 0 0;
    }
    100%{
      background-position:15% 25%, 75% 30%, 35% 75%, 25% 65%, 0 0;
    }
  }
  @media (prefers-reduced-motion: reduce){
    .ambient-bg{animation:none;}
  }

  .app-shell{
    position:relative;
    z-index:1;
    max-width:1440px;
    margin:0 auto;
    padding:22px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  /* Base "liquid glass" panel: frosted, translucent, with a soft inner
     rim-light along the top edge to read as a lit pane rather than a flat
     tinted rectangle. */
  .glass{
    position:relative;
    background:linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02)), var(--glass-strong);
    -webkit-backdrop-filter:blur(28px) saturate(160%);
    backdrop-filter:blur(28px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-xl);
    box-shadow:var(--shadow-lift), inset 0 1px 0 rgba(255,255,255,0.16);
  }

  /* ---- Topbar ---- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    padding:16px 24px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:42px; height:42px;
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow:0 10px 22px -8px rgba(124,107,255,0.65), inset 0 1px 0 rgba(255,255,255,0.45);
    color:#0a0a14;
    font-size:1.25rem;
    flex:0 0 auto;
  }
  .brand-text{display:flex; flex-direction:column; line-height:1.2;}
  .brand-name{
    font-size:1.4rem;
    font-weight:800;
    letter-spacing:-0.02em;
    background:linear-gradient(135deg, #ffffff, #cdc7ff 55%, #8be9dc);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .brand-sub{
    font-size:0.72rem;
    font-weight:500;
    color:var(--text-3);
    letter-spacing:0.01em;
  }
  .page-readout{
    font-size:0.78rem;
    font-weight:600;
    color:var(--text-2);
    padding:9px 18px;
    border-radius:var(--radius-pill);
    background:rgba(255,255,255,0.08);
    border:1px solid var(--glass-border);
    white-space:nowrap;
  }

  /* ---- Toolbar ---- */
  .toolbar{
    display:flex;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:14px;
    padding:14px 22px;
  }
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{
    font-size:0.65rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--text-3);
  }
  select, input[type="text"]{
    font-family:inherit;
    font-size:0.85rem;
    font-weight:500;
    color:var(--text-1);
    background:rgba(255,255,255,0.07);
    border:1px solid var(--glass-border);
    border-radius:12px;
    padding:9px 12px;
    outline:none;
    transition:background .15s, border-color .15s, box-shadow .15s;
  }
  select{cursor:pointer;}
  select option{background:#14162a; color:var(--text-1);}
  input[type="text"]{width:220px;}
  select:hover, input[type="text"]:hover{background:rgba(255,255,255,0.11);}
  select:focus-visible, input[type="text"]:focus-visible{
    border-color:var(--accent-b);
    box-shadow:0 0 0 3px rgba(51,224,200,0.28);
  }
  .toggle-label{
    display:flex; align-items:center; gap:8px;
    font-size:0.78rem; font-weight:500;
    color:var(--text-2);
    cursor:pointer; user-select:none;
    padding:9px 16px 9px 12px;
    border-radius:var(--radius-pill);
    background:rgba(255,255,255,0.055);
    border:1px solid var(--glass-border);
    align-self:center;
  }
  .toggle-label input[type="checkbox"]{
    accent-color:var(--accent-b);
    width:15px; height:15px;
    cursor:pointer;
  }
  .status-line{
    font-size:0.75rem;
    font-weight:500;
    color:var(--text-3);
    margin-left:auto;
    align-self:center;
  }

  /* ---- Category pills ---- */
  .tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:2px 2px 6px;
  }
  .tab{
    flex:0 0 auto;
    font-size:0.78rem;
    font-weight:600;
    color:var(--text-2);
    background:rgba(255,255,255,0.06);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-pill);
    padding:9px 18px;
    cursor:pointer;
    white-space:nowrap;
    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);
    transition:background .15s, color .15s, transform .08s, box-shadow .15s;
  }
  .tab:hover{background:rgba(255,255,255,0.13); color:var(--text-1);}
  .tab:active{transform:scale(0.97);}
  .tab:focus-visible{outline:2px solid var(--accent-b); outline-offset:2px;}
  .tab.active{
    color:#0a0a14;
    background:linear-gradient(135deg, var(--accent-a), var(--accent-b));
    border-color:transparent;
    box-shadow:0 8px 20px -8px rgba(124,107,255,0.6), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* ---- Main split ---- */
  main{
    flex:1;
    display:grid;
    grid-template-columns:minmax(300px, 400px) 1fr;
    gap:16px;
    min-height:0;
  }
  @media (max-width:900px){
    main{grid-template-columns:1fr;}
  }

  .channel-pane{
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
  }
  .channel-pane-head{
    padding:14px 22px;
    font-size:0.7rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--text-3);
    border-bottom:1px solid var(--glass-border);
    flex:0 0 auto;
  }
  .channel-list{overflow-y:auto; flex:1;}
  .channel-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 22px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    cursor:pointer;
    transition:background .12s;
  }
  .channel-row:hover{background:rgba(255,255,255,0.06);}
  .channel-row:focus-visible{outline:2px solid var(--accent-b); outline-offset:-2px;}
  .channel-row.active{
    background:linear-gradient(90deg, rgba(139,123,255,0.26), rgba(51,224,200,0.1));
    box-shadow:inset 3px 0 0 var(--accent-b);
  }
  .ch-num{
    font-size:0.72rem;
    font-weight:600;
    font-variant-numeric:tabular-nums;
    color:var(--text-3);
    min-width:26px;
  }
  .ch-name{
    flex:1;
    font-size:0.85rem;
    font-weight:500;
    color:var(--text-1);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .ch-group{
    font-size:0.62rem;
    font-weight:600;
    color:var(--text-2);
    background:rgba(255,255,255,0.08);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-pill);
    padding:2px 9px;
    white-space:nowrap;
  }
  .ch-warn{
    font-size:0.62rem;
    font-weight:700;
    color:#2a0810;
    background:linear-gradient(135deg, var(--danger-a), var(--danger-b));
    border-radius:var(--radius-pill);
    padding:2px 9px;
    white-space:nowrap;
  }
  .empty-state, .status-line{
    padding:18px 22px;
    font-size:0.8rem;
    color:var(--text-3);
  }

  /* ---- Player ---- */
  .player-pane{
    display:flex;
    flex-direction:column;
    gap:14px;
    min-height:0;
  }
  .video-wrap{
    position:relative;
    flex:1;
    min-height:280px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#000;
  }
  video{
    width:100%;
    height:100%;
    max-height:65vh;
    background:#000;
    border-radius:inherit;
  }
  .tune-overlay{
    position:absolute; inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    background:linear-gradient(160deg, rgba(22,18,42,0.92), rgba(6,7,14,0.96));
    -webkit-backdrop-filter:blur(6px);
    backdrop-filter:blur(6px);
    color:var(--text-1);
    text-align:center;
    padding:24px;
    font-size:1rem;
    font-weight:600;
  }
  .tune-overlay span{
    font-size:0.8rem;
    font-weight:500;
    color:var(--text-2);
    max-width:420px;
  }
  .tune-icon{
    width:46px; height:46px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--accent-a), var(--accent-b));
    color:#0a0a14;
    font-size:1.1rem;
    box-shadow:0 10px 26px -10px rgba(124,107,255,0.7);
  }
  .tune-overlay button{
    font-family:inherit;
    font-weight:700;
    font-size:0.78rem;
    letter-spacing:0.02em;
    background:linear-gradient(135deg, var(--accent-a), var(--accent-b));
    color:#0a0a14;
    border:none;
    border-radius:var(--radius-pill);
    padding:11px 24px;
    cursor:pointer;
    box-shadow:0 10px 24px -10px rgba(124,107,255,0.65);
    transition:transform .1s;
  }
  .tune-overlay button:hover{transform:translateY(-1px);}
  .tune-overlay button:active{transform:translateY(0);}
  .tune-overlay button:focus-visible{outline:2px solid #fff; outline-offset:2px;}

  .now-playing{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    padding:14px 22px;
  }
  #npName{font-size:1rem; font-weight:700; color:var(--text-1);}
  .now-playing .np-sub{font-size:0.72rem; font-weight:500; color:var(--text-3);}

  /* ---- Footer ---- */
  footer{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    padding:12px 24px;
    font-size:0.72rem;
    font-weight:500;
    color:var(--text-3);
  }
  footer span.hl{color:var(--text-1); font-weight:700;}

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.16); border-radius:6px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.28);}

  @keyframes shimmer{
    0%, 100%{opacity:0.5;}
    50%{opacity:1;}
  }
  .loading-flicker{animation:shimmer 1.6s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){
    .loading-flicker{animation:none;}
  }
</style>
</head>
<body>

<div class="ambient-bg" aria-hidden="true"></div>

<div class="app-shell">

  <header class="glass topbar">
    <div class="brand">
      <div class="brand-mark">◎</div>
      <div class="brand-text">
        <span class="brand-name">Prism</span>
        <span class="brand-sub">13,000+ live channels, via iptv-org</span>
      </div>
    </div>
    <div class="page-readout" id="pageReadout">tuning in&hellip;</div>
  </header>

  <div class="toolbar glass">
    <div class="field">
      <label for="langSelect">Language</label>
      <select id="langSelect"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="countrySelect">Country</label>
      <select id="countrySelect"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="searchBox">Find</label>
      <input type="text" id="searchBox" placeholder="Search channels&hellip;">
    </div>
    <label class="toggle-label"><input type="checkbox" id="showClosed"><span>Show discontinued</span></label>
    <span class="status-line" id="loadStatus">loading playlist&hellip;</span>
  </div>

  <div class="tabs" id="categoryTabs">
    <div class="tab active" data-cat="" tabindex="0" role="button">All</div>
  </div>

  <main>
    <section class="channel-pane glass">
      <div class="channel-pane-head" id="paneHead">Channels</div>
      <div class="channel-list" id="channelList">
        <div class="empty-state loading-flicker">Tuning in&hellip; fetching index.m3u</div>
      </div>
    </section>

    <section class="player-pane">
      <div class="video-wrap glass">
        <video id="video" controls playsinline></video>
        <div class="tune-overlay" id="tuneOverlay">
          <div class="tune-icon">▷</div>
          No signal
          <span>Select a channel from the list to start watching.</span>
        </div>
      </div>
      <div class="now-playing glass">
        <div>
          <div id="npName">No channel selected</div>
          <div class="np-sub" id="npSub">standing by</div>
        </div>
        <div class="np-sub" id="npGroup"></div>
      </div>
    </section>
  </main>

  <footer class="glass">
    <div>Source: <span class="hl">iptv-org/iptv + iptv-org/database</span></div>
    <div id="footerStats">channels: <span class="hl">0</span> &nbsp;&middot;&nbsp; shown: <span class="hl">0</span></div>
    <div id="footerLast">last watched: <span class="hl">none</span></div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<script>
(function(){
  "use strict";

  var CATEGORY_PLAYLIST_URL = "https://iptv-org.github.io/iptv/index.m3u";
  var LANGUAGE_PLAYLIST_URL = "https://iptv-org.github.io/iptv/index.language.m3u";
  var DATABASE_CSV_URL = "https://raw.githubusercontent.com/iptv-org/database/master/data/channels.csv";
  var LS_LAST_CHANNEL = "iptvtext_last_channel";
  var LS_LAST_LANGUAGE = "iptvtext_last_language";
  var LS_LAST_COUNTRY = "iptvtext_last_country";
  var LS_SHOW_CLOSED = "iptvtext_show_closed";

  // The source repo tags every channel with one of ~30 fine-grained raw
  // categories. That's too many tabs to browse comfortably, so we fold
  // them down into a short list of everyday buckets.
  var META_CATEGORY_MAP = {
    "movies": "Movies & Series",
    "series": "Movies & Series",
    "classic": "Movies & Series",
    "music": "Music",
    "documentary": "Documentary",
    "science": "Documentary",
    "education": "Documentary",
    "culture": "Documentary",
    "news": "News & Business",
    "business": "News & Business",
    "legislative": "News & Business",
    "public": "News & Business",
    "sports": "Sports",
    "kids": "Kids & Family",
    "family": "Kids & Family",
    "animation": "Kids & Family",
    "entertainment": "Entertainment",
    "comedy": "Entertainment",
    "lifestyle": "Lifestyle",
    "cooking": "Lifestyle",
    "travel": "Lifestyle",
    "outdoor": "Lifestyle",
    "relax": "Lifestyle",
    "weather": "Lifestyle",
    "auto": "Lifestyle",
    "religious": "Religious",
    "shop": "Shopping",
    "general": "General",
    "interactive": "General",
    "undefined": "General"
  };
  var META_CATEGORY_ORDER = [
    "Movies & Series", "Music", "Documentary", "News & Business", "Sports",
    "Kids & Family", "Entertainment", "Lifestyle", "Religious", "Shopping",
    "General"
  ];

  var allChannels = [];
  var categories = [];   // curated meta-category labels present in the data
  var languages = [];    // sorted list of language names from index.language.m3u
  var countries = [];    // sorted list of {code, label}
  var activeCategory = "";
  var activeLanguage = "";
  var activeCountry = "";
  var showClosed = false;
  var searchTerm = "";
  var hls = null;

  var countryNamer = null;
  try {
    if (window.Intl && Intl.DisplayNames){
      countryNamer = new Intl.DisplayNames(["en"], { type: "region" });
    }
  } catch (e){ countryNamer = null; }

  function countryLabel(code){
    if (!code) return "";
    if (countryNamer){
      try {
        var n = countryNamer.of(code.toUpperCase());
        if (n && n !== code.toUpperCase()) return n;
      } catch(e){ /* fall through */ }
    }
    return code.toUpperCase();
  }

  var els = {
    pageReadout: document.getElementById("pageReadout"),
    loadStatus: document.getElementById("loadStatus"),
    langSelect: document.getElementById("langSelect"),
    countrySelect: document.getElementById("countrySelect"),
    showClosed: document.getElementById("showClosed"),
    searchBox: document.getElementById("searchBox"),
    categoryTabs: document.getElementById("categoryTabs"),
    channelList: document.getElementById("channelList"),
    paneHead: document.getElementById("paneHead"),
    video: document.getElementById("video"),
    tuneOverlay: document.getElementById("tuneOverlay"),
    npName: document.getElementById("npName"),
    npSub: document.getElementById("npSub"),
    npGroup: document.getElementById("npGroup"),
    footerStats: document.getElementById("footerStats"),
    footerLast: document.getElementById("footerLast")
  };

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function channelKey(ch){
    return ch.id + "|" + ch.url;
  }

  // index.m3u / index.language.m3u append a quality suffix to tvg-id, e.g.
  // "BBCOne.uk@HD" or "BBCOne.uk@SD". channels.csv uses the bare id
  // ("BBCOne.uk"), so cross-referencing needs this stripped off.
  function baseId(id){
    var at = id.indexOf("@");
    return at === -1 ? id : id.substring(0, at);
  }

  // ---------- M3U parsing ----------
  function parseM3U(text){
    var lines = text.split(/\r?\n/);
    var out = [];
    var current = null;
    var attrRegex = /([a-zA-Z0-9\-]+)="([^"]*)"/g;

    for (var i = 0; i < lines.length; i++){
      var line = lines[i].trim();
      if (!line) continue;

      if (line.indexOf("#EXTINF") === 0){
        var attrs = {};
        attrRegex.lastIndex = 0;
        var m;
        while ((m = attrRegex.exec(line)) !== null){
          attrs[m[1].toLowerCase()] = m[2];
        }
        var nameMatch = line.match(/,([^,]*)$/);
        var name = nameMatch ? nameMatch[1].trim() : "Unnamed channel";
        var rawGroup = (attrs["group-title"] || "Undefined").trim() || "Undefined";
        var rawTokens = rawGroup.split(/[;,]/).map(function(s){ return s.trim(); }).filter(Boolean);
        var metaSet = {};
        rawTokens.forEach(function(tok){
          var meta = META_CATEGORY_MAP[tok.toLowerCase()] || "General";
          metaSet[meta] = true;
        });
        current = {
          name: name,
          logo: attrs["tvg-logo"] || "",
          rawGroup: rawGroup,
          metaCategories: Object.keys(metaSet),
          languages: [],           // filled in later from index.language.m3u
          country: attrs["tvg-country"] || "",
          isClosed: false,         // filled in later from channels.csv
          requiredUserAgent: attrs["http-user-agent"] || "",
          requiredReferrer: attrs["http-referrer"] || "",
          id: attrs["tvg-id"] || name
        };
      } else if (line.charAt(0) === "#"){
        continue; // other directives (#EXTVLCOPT, #EXTGRP, etc.)
      } else {
        if (current){
          current.url = line;
          out.push(current);
          current = null;
        }
      }
    }
    return out;
  }

  // ---------- Load playlists ----------
  function fetchText(url){
    return fetch(url).then(function(res){
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);
      return res.text();
    });
  }

  function loadPlaylist(){
    Promise.all([
      fetchText(CATEGORY_PLAYLIST_URL),
      fetchText(LANGUAGE_PLAYLIST_URL).catch(function(err){
        console.warn("Language playlist failed to load, continuing without it:", err);
        return null; // categories still work even if this one fails
      }),
      fetchText(DATABASE_CSV_URL).catch(function(err){
        console.warn("Channel database failed to load, continuing without it:", err);
        return null; // country/closed/nsfw enrichment just won't be available
      })
    ])
      .then(function(results){
        var categoryText = results[0];
        var languageText = results[1];
        var csvText = results[2];

        allChannels = parseM3U(categoryText);
        if (!allChannels.length){
          throw new Error("Playlist parsed but no channels found");
        }

        if (languageText){
          applyLanguages(languageText);
        }
        if (csvText){
          applyDatabaseMeta(csvText);
        }

        buildIndexes();
        restorePreferences();
        renderCategoryTabs();
        renderLanguageSelect();
        renderCountrySelect();
        renderChannelList();
        els.loadStatus.textContent = allChannels.length + " channels loaded";
        els.pageReadout.textContent = "Ready";
        els.pageReadout.classList.remove("loading-flicker");
        attemptResumeLastChannel();
      })
      .catch(function(err){
        console.error(err);
        els.loadStatus.textContent = "signal lost: " + err.message;
        els.pageReadout.textContent = "No signal";
        els.pageReadout.classList.remove("loading-flicker");
        els.channelList.innerHTML =
          '<div class="empty-state">' +
          "Could not fetch the playlist (" + escapeHtml(err.message) + ").<br><br>" +
          "This usually means either you are offline, or this page was opened " +
          "in a way that blocks cross-origin requests. Try opening this file " +
          "over a local web server instead of directly from disk, or check your " +
          "connection, then reload." +
          "</div>";
      });
  }

  // channels.csv is iptv-org's channel database: id,name,alt_names,network,
  // owners,country,categories,is_nsfw,launched,closed,replaced_by,website.
  // No field contains a raw comma, so a plain split is safe here. Note:
  // iptv-org excludes adult content from the public stream playlist
  // entirely, so is_nsfw is not relevant to anything reachable here.
  function applyDatabaseMeta(csvText){
    var lines = csvText.split(/\r?\n/);
    var meta = {};
    for (var i = 1; i < lines.length; i++){
      var line = lines[i];
      if (!line) continue;
      var cols = line.split(",");
      if (cols.length < 10) continue;
      var id = cols[0].trim();
      if (!id) continue;
      meta[id] = {
        country: (cols[5] || "").trim(),
        isClosed: !!(cols[9] || "").trim()
      };
    }
    allChannels.forEach(function(ch){
      var m = meta[baseId(ch.id)];
      if (!m) return;
      if (m.country) ch.country = m.country;
      ch.isClosed = m.isClosed;
    });
  }

  // index.language.m3u lists channels again, this time grouped by
  // group-title = language name. We key on tvg-id to attach language(s)
  // back onto the channels we already parsed from index.m3u.
  function applyLanguages(languageText){
    var langEntries = parseM3U(languageText);
    var idToLangs = {};
    langEntries.forEach(function(entry){
      if (!entry.id) return;
      var key = baseId(entry.id);
      var langs = idToLangs[key] || (idToLangs[key] = {});
      entry.rawGroup.split(/[;,]/).forEach(function(l){
        l = l.trim();
        if (l) langs[l] = true;
      });
    });
    allChannels.forEach(function(ch){
      var langs = idToLangs[baseId(ch.id)];
      ch.languages = langs ? Object.keys(langs).sort() : [];
    });
  }

  function buildIndexes(){
    var catSet = {};
    var langSet = {};
    var countrySet = {};
    allChannels.forEach(function(ch){
      ch.metaCategories.forEach(function(c){ catSet[c] = true; });
      ch.languages.forEach(function(l){ langSet[l] = true; });
      if (ch.country) countrySet[ch.country] = true;
    });
    categories = META_CATEGORY_ORDER.filter(function(c){ return catSet[c]; });
    languages = Object.keys(langSet).sort(function(a,b){ return a.localeCompare(b); });
    countries = Object.keys(countrySet)
      .map(function(code){ return { code: code, label: countryLabel(code) }; })
      .sort(function(a,b){ return a.label.localeCompare(b.label); });
  }

  function restorePreferences(){
    var savedLang = localStorage.getItem(LS_LAST_LANGUAGE);
    if (savedLang && languages.indexOf(savedLang) !== -1){
      activeLanguage = savedLang;
    }
    var savedCountry = localStorage.getItem(LS_LAST_COUNTRY);
    if (savedCountry && countries.some(function(c){ return c.code === savedCountry; })){
      activeCountry = savedCountry;
    }
    showClosed = localStorage.getItem(LS_SHOW_CLOSED) === "1";
    els.showClosed.checked = showClosed;
  }

  // ---------- Rendering ----------
  // Filters that apply regardless of which category tab is active: language,
  // country, search text, and the discontinued toggle.
  function channelPassesGlobalFilters(ch){
    if (activeLanguage && ch.languages.indexOf(activeLanguage) === -1) return false;
    if (activeCountry && ch.country !== activeCountry) return false;
    if (!showClosed && ch.isClosed) return false;
    var term = searchTerm.trim().toLowerCase();
    if (term && ch.name.toLowerCase().indexOf(term) === -1) return false;
    return true;
  }

  function renderCategoryTabs(){
    var globallyVisible = allChannels.filter(channelPassesGlobalFilters);

    var html = '<div class="tab' + (activeCategory === "" ? " active" : "") + '" data-cat="" tabindex="0" role="button">All (' + globallyVisible.length + ')</div>';
    categories.forEach(function(cat){
      var count = globallyVisible.filter(function(c){ return c.metaCategories.indexOf(cat) !== -1; }).length;
      html += '<div class="tab' + (activeCategory === cat ? " active" : "") + '" data-cat="' +
        escapeHtml(cat) + '" tabindex="0" role="button">' + escapeHtml(cat) + " (" + count + ")</div>";
    });
    els.categoryTabs.innerHTML = html;

    Array.prototype.forEach.call(els.categoryTabs.querySelectorAll(".tab"), function(tab){
      tab.addEventListener("click", function(){
        activeCategory = tab.getAttribute("data-cat");
        renderCategoryTabs();
        renderChannelList();
      });
      tab.addEventListener("keydown", function(e){
        if (e.key === "Enter" || e.key === " "){
          e.preventDefault();
          tab.click();
        }
      });
    });
  }

  function renderLanguageSelect(){
    var html = '<option value="">All languages</option>';
    languages.forEach(function(lang){
      html += '<option value="' + escapeHtml(lang) + '"' +
        (lang === activeLanguage ? " selected" : "") + ">" + escapeHtml(lang) + "</option>";
    });
    els.langSelect.innerHTML = html;
  }

  function renderCountrySelect(){
    var html = '<option value="">All countries</option>';
    countries.forEach(function(c){
      html += '<option value="' + escapeHtml(c.code) + '"' +
        (c.code === activeCountry ? " selected" : "") + ">" + escapeHtml(c.label) + "</option>";
    });
    els.countrySelect.innerHTML = html;
  }

  function getFilteredChannels(){
    return allChannels.filter(function(ch){
      if (activeCategory && ch.metaCategories.indexOf(activeCategory) === -1) return false;
      return channelPassesGlobalFilters(ch);
    });
  }

  function renderChannelList(){
    var filtered = getFilteredChannels();
    els.paneHead.textContent = "Channels" + (activeCategory ? " / " + activeCategory : "");
    els.footerStats.innerHTML = "channels: <span class=\"hl\">" + allChannels.length +
      "</span> &nbsp;&middot;&nbsp; shown: <span class=\"hl\">" + filtered.length + "</span>";

    if (!filtered.length){
      els.channelList.innerHTML = '<div class="empty-state">No channels match this filter. Try another language or category.</div>';
      return;
    }

    var lastKey = localStorage.getItem(LS_LAST_CHANNEL);
    var html = "";
    filtered.forEach(function(ch, idx){
      var isActive = lastKey && channelKey(ch) === lastKey && ch === currentChannel;
      html += '<div class="channel-row' + (isActive ? " active" : "") + '" data-key="' +
        escapeHtml(channelKey(ch)) + '" tabindex="0" role="button">' +
        '<span class="ch-num">' + String(idx + 1).padStart(3, "0") + '</span>' +
        '<span class="ch-name" title="' + escapeHtml(ch.name) + '">' + escapeHtml(ch.name) + '</span>' +
        (ch.country ? '<span class="ch-group" title="' + escapeHtml(countryLabel(ch.country)) + '">' + escapeHtml(ch.country) + '</span>' : '') +
        '<span class="ch-group">' + escapeHtml(ch.rawGroup) + '</span>' +
        (ch.requiredReferrer ? '<span class="ch-warn" title="This channel requires a Referer header that a webpage cannot send. It will likely fail to play here.">Needs referer</span>' : '') +
        '</div>';
    });
    els.channelList.innerHTML = html;

    Array.prototype.forEach.call(els.channelList.querySelectorAll(".channel-row"), function(row, idx){
      row.addEventListener("click", function(){
        playChannel(filtered[idx]);
      });
      row.addEventListener("keydown", function(e){
        if (e.key === "Enter" || e.key === " "){
          e.preventDefault();
          playChannel(filtered[idx]);
        }
      });
    });
  }

  // ---------- Playback ----------
  var currentChannel = null;

  function markActiveRow(){
    Array.prototype.forEach.call(els.channelList.querySelectorAll(".channel-row"), function(row){
      row.classList.toggle("active", currentChannel && row.getAttribute("data-key") === channelKey(currentChannel));
    });
  }

  function playChannel(ch){
    currentChannel = ch;
    els.tuneOverlay.style.display = "flex";
    els.tuneOverlay.innerHTML = '<div class="tune-icon">&hellip;</div>Tuning in<br><span>' + escapeHtml(ch.name) + "</span>";
    els.npName.textContent = ch.name;
    els.npSub.textContent = "tuning\u2026";
    var npBits = [ch.rawGroup];
    if (ch.country) npBits.push(countryLabel(ch.country));
    if (ch.languages.length) npBits.push(ch.languages.join(", "));
    els.npGroup.textContent = npBits.join("  \u2022  ");
    markActiveRow();

    if (hls){
      hls.destroy();
      hls = null;
    }
    els.video.pause();
    els.video.removeAttribute("src");
    els.video.load();

    var isM3U8 = /\.m3u8($|\?)/i.test(ch.url);

    function onPlayable(){
      els.tuneOverlay.style.display = "none";
      els.npSub.textContent = "now watching";
    }

    // hls.js/details -> a plain-English reason. These map roughly to
    // "the manifest itself didn't load" vs "it loaded but the video
    // segments didn't" vs "the browser refused to decode what came back".
    var HLS_DETAIL_EXPLANATIONS = {
      manifestLoadError: "the channel's playlist file could not be fetched (dead link, or the server blocked this browser)",
      manifestLoadTimeOut: "the channel's playlist file timed out",
      manifestParsingError: "the playlist file came back but was not valid HLS",
      levelLoadError: "the stream's quality index could not be fetched",
      levelLoadTimeOut: "the stream's quality index timed out",
      fragLoadError: "the video segments were blocked or refused (often a CORS or hotlink restriction)",
      fragLoadTimeOut: "the video segments timed out"
    };

    function describeFailure(hlsDetails){
      var bits = [];
      if (hlsDetails && HLS_DETAIL_EXPLANATIONS[hlsDetails]){
        bits.push(HLS_DETAIL_EXPLANATIONS[hlsDetails]);
      } else if (hlsDetails){
        bits.push(hlsDetails);
      } else {
        bits.push("this stream did not respond");
      }
      if (ch.requiredReferrer){
        bits.push("this channel also requires a Referer header (\"" + ch.requiredReferrer +
          "\") that a webpage is not allowed to send \u2014 that is very likely the real cause, and no browser-only page can work around it");
      } else if (ch.requiredUserAgent){
        bits.push("this channel expects a specific player User-Agent; a best-effort attempt was made to send one, but some browsers silently block pages from overriding it");
      }
      return bits.join(". ");
    }

    function onFail(hlsDetails){
      els.tuneOverlay.style.display = "flex";
      els.tuneOverlay.innerHTML = '<div class="tune-icon">&#9888;</div>Signal lost<br><span>' +
        escapeHtml(describeFailure(hlsDetails)) +
        "</span><button id=\"retryBtn\">Retry</button>";
      els.npSub.textContent = "no signal";
      var btn = document.getElementById("retryBtn");
      if (btn) btn.addEventListener("click", function(){ playChannel(ch); });
    }

    if (isM3U8 && window.Hls && window.Hls.isSupported()){
      hls = new Hls({
        maxBufferLength: 30,
        xhrSetup: function(xhr){
          // Best-effort only: browsers may silently ignore an overridden
          // User-Agent, and will always refuse a spoofed Referer outright.
          if (ch.requiredUserAgent){
            try { xhr.setRequestHeader("User-Agent", ch.requiredUserAgent); } catch (e) { /* ignored by browser */ }
          }
        }
      });
      hls.loadSource(ch.url);
      hls.attachMedia(els.video);
      hls.on(Hls.Events.MANIFEST_PARSED, function(){
        els.video.play().then(onPlayable).catch(function(){
          onPlayable();
          els.tuneOverlay.style.display = "flex";
          els.tuneOverlay.innerHTML = '<div class="tune-icon">&#9654;</div>Ready<br><span>Tap play on the video.</span>';
        });
      });
      hls.on(Hls.Events.ERROR, function(evt, data){
        if (data.fatal) onFail(data.details);
      });
    } else if (isM3U8 && els.video.canPlayType("application/vnd.apple.mpegurl")){
      els.video.src = ch.url;
      els.video.play().then(onPlayable).catch(function(){ onPlayable(); });
      els.video.onerror = function(){ onFail(""); };
    } else {
      els.video.src = ch.url;
      els.video.play().then(onPlayable).catch(function(){
        onPlayable();
        els.tuneOverlay.style.display = "flex";
        els.tuneOverlay.innerHTML = '<div class="tune-icon">&#9654;</div>Ready<br><span>Tap play on the video.</span>';
      });
      els.video.onerror = function(){ onFail(""); };
    }

    localStorage.setItem(LS_LAST_CHANNEL, channelKey(ch));
    els.footerLast.innerHTML = "last watched: <span class=\"hl\">" + escapeHtml(ch.name) + "</span>";
  }

  function attemptResumeLastChannel(){
    var lastKey = localStorage.getItem(LS_LAST_CHANNEL);
    if (!lastKey) return;
    var found = allChannels.filter(function(ch){ return channelKey(ch) === lastKey; })[0];
    if (found){
      els.footerLast.innerHTML = "last watched: <span class=\"hl\">" + escapeHtml(found.name) + "</span> (tap to resume)";
      els.npName.textContent = found.name;
      els.npSub.textContent = "tap this channel in the list to resume";
      var npBits = [found.rawGroup];
      if (found.country) npBits.push(countryLabel(found.country));
      if (found.languages.length) npBits.push(found.languages.join(", "));
      els.npGroup.textContent = npBits.join("  \u2022  ");
      // Browsers block unattended autoplay with sound, so we surface a resume
      // prompt in the player instead of forcing playback on load.
      els.tuneOverlay.innerHTML = '<div class="tune-icon">&#9654;</div>Last watched<br><span>' +
        escapeHtml(found.name) + "</span><button id=\"resumeBtn\">Resume</button>";
      var btn = document.getElementById("resumeBtn");
      if (btn) btn.addEventListener("click", function(){ playChannel(found); });
    }
  }

  // ---------- Events ----------
  els.langSelect.addEventListener("change", function(){
    activeLanguage = els.langSelect.value;
    localStorage.setItem(LS_LAST_LANGUAGE, activeLanguage);
    renderCategoryTabs();
    renderChannelList();
  });

  els.countrySelect.addEventListener("change", function(){
    activeCountry = els.countrySelect.value;
    localStorage.setItem(LS_LAST_COUNTRY, activeCountry);
    renderCategoryTabs();
    renderChannelList();
  });

  els.showClosed.addEventListener("change", function(){
    showClosed = els.showClosed.checked;
    localStorage.setItem(LS_SHOW_CLOSED, showClosed ? "1" : "0");
    renderCategoryTabs();
    renderChannelList();
  });

  var searchDebounce;
  els.searchBox.addEventListener("input", function(){
    clearTimeout(searchDebounce);
    var val = els.searchBox.value;
    searchDebounce = setTimeout(function(){
      searchTerm = val;
      renderCategoryTabs();
      renderChannelList();
    }, 150);
  });

  loadPlaylist();
})();
</script>
</body>
</html>
